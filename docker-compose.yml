# Diewish — full-stack production-style composition.
# Brings up PostgreSQL, the Express API, and the Next.js web app.
#
# Usage:
#   1. Copy backend/.env.production.example  -> backend/.env  (fill in secrets)
#   2. Copy frontend/.env.production.example -> frontend/.env (fill in URLs)
#   3. docker compose up --build
#
# NOTE: This file is a deployment artifact for review/self-hosting. It is not
# auto-deployed by this repository.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diewish}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diewish}
      POSTGRES_DB: ${POSTGRES_DB:-diewish}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diewish} -d ${POSTGRES_DB:-diewish}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override the DB host to the compose service; keep other values from .env.
      DATABASE_URL: postgresql://${POSTGRES_USER:-diewish}:${POSTGRES_PASSWORD:-diewish}@db:5432/${POSTGRES_DB:-diewish}?schema=public
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* must be provided at build time.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:
